<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vion Logics - Data Entry</title>
    <style>
        /* Modern reset and font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Background using Vion Logics color scheme */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #001f3f 0%, #0044cc 100%);
            color: white;
        }

        /* Centered Glassmorphism Container */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 400px;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Styled Input */
        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.5);
        }

        /* Action Button */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #007bff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>VION LOGICS</h2>
        <p style="margin-bottom: 20px; opacity: 0.8;">YOUR VISION, ENGINEERED</p>
        
        <input type="text" id="username" placeholder="Enter Student Name">
        <button onclick="sendData()">Submit to Database</button>
    </div>

    <script>
        function sendData() {
            const nameInput = document.getElementById('username');
            const name = nameInput.value;

            if (!name) {
                alert("Please enter a name first!");
                return;
            }

            fetch('http://localhost:5000/add-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name })
            })
            .then(res => res.text())
            .then(data => {
                alert(data);
                nameInput.value = ''; // Clear input after success
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Connection failed!');
            });
        }
    </script>
</body>
</html>
